<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Titan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg">
      <div class="mesh-gradient"></div>
      <div class="grain-overlay"></div>
    </div>
    <div class="auth-card fade-in-up">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L28 8V24L16 30L4 24V8L16 2Z" stroke="url(#lg)" stroke-width="2" fill="none"/>
          <path d="M16 8L22 11V21L16 24L10 21V11L16 8Z" fill="url(#lg)"/>
          <defs><linearGradient id="lg" x1="4" y1="2" x2="28" y2="30"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to your Titan AI workspace</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@business.com.au" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Log In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="/register">Start free</a></p>
      </div>
      <div id="loginError" style="color:var(--accent-red);font-size:0.85rem;text-align:center;margin-top:1rem;display:none;"></div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { document.getElementById('loginError').textContent = data.error; document.getElementById('loginError').style.display = 'block'; return; }
        localStorage.setItem('titan_token', data.token);
        localStorage.setItem('titan_user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
      } catch (err) {
        document.getElementById('loginError').textContent = 'Connection error. Try again.';
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
