<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Studio — Titan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="studio-page">
    <div class="studio-bg"></div>
    
    <!-- SIDEBAR -->
    <aside class="studio-sidebar">
      <a href="/" class="logo-mark">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M16 2L28 8V24L16 30L4 24V8L16 2Z" stroke="url(#lg)" stroke-width="2" fill="none"/>
            <path d="M16 8L22 11V21L16 24L10 21V11L16 8Z" fill="url(#lg)"/>
            <defs><linearGradient id="lg" x1="4" y1="2" x2="28" y2="30"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
        </div>
        <span class="logo-text">TITAN<span class="logo-accent">AI</span></span>
      </a>
      <div class="studio-modes">
        <button class="mode-btn active" data-mode="chat"><span class="mode-icon">💬</span> Chat</button>
        <button class="mode-btn" data-mode="web"><span class="mode-icon">🌐</span> Web Builder</button>
        <button class="mode-btn" data-mode="app"><span class="mode-icon">📱</span> App Builder</button>
        <button class="mode-btn" data-mode="code"><span class="mode-icon">⌨️</span> Code Studio</button>
        <button class="mode-btn" data-mode="design"><span class="mode-icon">🎨</span> Design Studio</button>
        <button class="mode-btn" data-mode="data"><span class="mode-icon">📊</span> Data Analysis</button>
      </div>
      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);">
        <a href="/dashboard" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem;">← Back to Dashboard</a>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="studio-main">
      <div class="chat-area">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-msg agent fade-in">
            <div class="chat-avatar">T</div>
            <div class="chat-bubble">
              <strong>Titan AI</strong><br><br>
              G'day! I'm Titan, your AI business platform. I can build websites, apps, logos, write copy, analyse data, manage your sales, and automate your operations — all in Australian English.<br><br>
              What are we building today?
            </div>
          </div>
        </div>
        
        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <input type="text" id="chatInput" placeholder="Tell Titan what you need..." autocomplete="off">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('titan_token');
    const user = JSON.parse(localStorage.getItem('titan_user') || 'null');
    if (!token || !user) { window.location.href = '/login'; }

    let currentMode = 'chat';
    const messages = [];

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        addSystemMessage(`Switched to ${btn.textContent.trim()} mode`);
      });
    });

    // Check URL params for mode
    const urlMode = new URLSearchParams(window.location.search).get('mode');
    if (urlMode) {
      const btn = document.querySelector(`[data-mode="${urlMode}"]`);
      if (btn) { btn.click(); }
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      addUserMessage(text);
      input.value = '';

      try {
        const res = await fetch('/api/agent/route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ message: text, mode: currentMode })
        });
        const data = await res.json();
        addAgentMessage(data.response.text, data.agent);
      } catch (err) {
        addAgentMessage('Sorry, I had trouble processing that. Try again?');
      }
    }

    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'chat-msg user fade-in';
      div.innerHTML = `<div class="chat-avatar">${(user.name || 'U')[0]}</div><div class="chat-bubble">${escapeHtml(text)}</div>`;
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
    }

    function addAgentMessage(text, agentName = 'Titan') {
      const div = document.createElement('div');
      div.className = 'chat-msg agent fade-in';
      div.innerHTML = `<div class="chat-avatar">T</div><div class="chat-bubble"><strong>${agentName}</strong><br><br>${formatMessage(text)}</div>`;
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'chat-msg fade-in';
      div.style.justifyContent = 'center';
      div.innerHTML = `<div style="color:var(--text-muted);font-size:0.8rem;padding:0.5rem 1rem;background:rgba(255,255,255,0.02);border-radius:8px;">${text}</div>`;
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
    }

    function formatMessage(text) {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                 .replace(/\n/g, '<br>')
                 .replace(/•/g, '&bull;');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      const el = document.getElementById('chatMessages');
      el.scrollTop = el.scrollHeight;
    }

    // Enter to send
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
